<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07080d;
  --surface:#0d0f18;
  --card:#111422;
  --card2:#181c2e;
  --border:rgba(255,255,255,0.05);
  --border2:rgba(255,255,255,0.11);
  --accent:#ff3860;
  --accent2:#ff6b3d;
  --cyan:#00d4ff;
  --gold:#ffcc44;
  --gold2:#ff9a00;
  --green:#0dde9a;
  --purple:#b06aff;
  --text:#eef0f8;
  --muted:rgba(255,255,255,0.35);
  --muted2:rgba(255,255,255,0.15);
  --glow-red:rgba(255,56,96,0.18);
  --glow-gold:rgba(255,204,68,0.15);
  --glow-cyan:rgba(0,212,255,0.12);
}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:grid;
  grid-template-columns:160px minmax(0,480px) 160px;
  grid-template-rows:auto 1fr auto;
  align-items:start;
  justify-content:center;
  gap:0;
}

/* Noise texture overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.4;
}

/* ══ HEADER ══ */
header{
  grid-column:1/-1;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  display:flex;align-items:center;gap:12px;
  height:58px;
  position:sticky;top:0;z-index:100;
}

.logo{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;letter-spacing:-.02em;flex-shrink:0;
}

.header-ad{
  flex:1;display:flex;align-items:center;justify-content:center;
  min-height:50px;max-height:58px;overflow:hidden;
}

.level-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--card2);border:1px solid var(--border2);
  border-radius:99px;padding:5px 12px;flex-shrink:0;
}
.lv-label{font-size:11px;font-weight:700;color:var(--gold);font-family:'JetBrains Mono',monospace}
.xp-bar{width:60px;height:4px;background:var(--border2);border-radius:4px;overflow:hidden}
.xp-inner{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.xp-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* ══ SIDEBARS ══ */
.sidebar{
  padding:16px 8px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.sidebar.left{grid-column:1;grid-row:2;align-items:flex-end}
.sidebar.right{grid-column:3;grid-row:2;align-items:flex-start}

.ad-sk-wrap{
  width:140px;min-height:280px;
  background:rgba(255,255,255,.018);
  border:1px dashed var(--border);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;
  writing-mode:vertical-rl;
}

/* ══ MAIN ══ */
main{
  grid-column:2;grid-row:2;
  padding:16px 14px 24px;
  display:flex;flex-direction:column;gap:12px;
  position:relative;z-index:1;
}

/* ══ FOOTER ══ */
footer{
  grid-column:1/-1;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:8px 16px;
  display:flex;align-items:center;justify-content:center;
  min-height:52px;
}

/* ══ STATS BAR ══ */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
}
.stat{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 6px;text-align:center;
  position:relative;overflow:hidden;transition:border-color .2s;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent-color,var(--accent));opacity:.4;
}
.stat:hover{border-color:var(--border2)}
.stat-v{
  font-family:'JetBrains Mono',monospace;
  font-size:22px;font-weight:700;line-height:1;
  color:var(--accent-color,var(--cyan));
}
.stat-l{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.07em;text-transform:uppercase}
.stat.games{--accent-color:var(--cyan)}
.stat.winr{--accent-color:var(--purple)}
.stat.streak{--accent-color:var(--gold)}
.stat.best{--accent-color:var(--green)}

/* ══ DAILY CHALLENGE ══ */
.daily{
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(176,106,255,.1),rgba(0,212,255,.06));
  border:1px solid rgba(176,106,255,.2);
  border-radius:14px;padding:12px 16px;cursor:pointer;
  transition:all .2s;
}
.daily:hover{border-color:rgba(176,106,255,.4);transform:translateY(-1px)}
.daily-ico{font-size:28px}
.daily-body{flex:1}
.daily-ttl{font-size:13px;font-weight:700;color:var(--purple)}
.daily-sub{font-size:11px;color:var(--muted);margin-top:1px}
.daily-badge-done{
  font-size:10px;font-weight:700;color:var(--green);
  background:rgba(13,222,154,.1);border:1px solid rgba(13,222,154,.25);
  border-radius:99px;padding:4px 10px;
}
.daily-badge-go{
  font-size:10px;font-weight:700;color:var(--gold);
  background:rgba(255,204,68,.1);border:1px solid rgba(255,204,68,.25);
  border-radius:99px;padding:4px 10px;
}

/* ══ GAME CARD ══ */
.game-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:20px;
  position:relative;overflow:hidden;
}
.game-card::after{
  content:'';position:absolute;
  top:-60px;right:-60px;width:200px;height:200px;
  background:radial-gradient(circle,var(--glow-red),transparent 70%);
  pointer-events:none;
}

/* ── Mode selector ── */
.mode-row{display:flex;gap:5px;margin-bottom:16px;background:var(--bg);border-radius:11px;padding:3px}
.mode-btn{
  flex:1;padding:7px 3px;border-radius:9px;border:none;
  background:transparent;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;
}
.mode-btn .m-ico{display:block;font-size:17px;margin-bottom:2px}
.mode-btn.active{background:var(--card2);color:var(--text);box-shadow:0 2px 10px rgba(0,0,0,.4)}

/* ── Difficulty ── */
.diff-row{display:flex;gap:5px;margin-bottom:14px}
.diff-btn{
  flex:1;padding:6px 3px;border-radius:9px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.diff-btn.active{
  border-color:var(--accent);color:var(--accent);
  background:rgba(255,56,96,.08);
}
.diff-btn:hover:not(.active){border-color:var(--border2);color:var(--text)}

/* ── Meta row ── */
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.range-txt{font-size:12px;color:var(--muted)}
.timer-display{
  font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;
  color:var(--cyan);display:none;
}
.timer-display.warn{color:var(--gold2);animation:pulse .6s infinite alternate}
.timer-display.danger{color:var(--accent);animation:pulse .3s infinite alternate}

/* ── Attempt dots ── */
.dots{display:flex;justify-content:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.dot{
  width:11px;height:11px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--border2);
  transition:all .25s;
}
.dot.used{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px var(--accent)}
.dot.active{background:var(--gold);border-color:var(--gold);transform:scale(1.4);box-shadow:0 0 10px var(--gold)}
.dot.won{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--green)}

/* ── Proximity ── */
.prox-wrap{margin-bottom:12px;display:none}
.prox-header{display:flex;justify-content:space-between;margin-bottom:5px}
.prox-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.prox-dist{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.prox-track{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.prox-fill{height:100%;border-radius:6px;width:0;transition:width .4s ease,background .4s ease}
.temp-txt{text-align:center;font-size:12px;font-weight:700;margin-top:5px;min-height:18px}

/* ── Message ── */
.msg-box{
  font-size:15px;font-weight:700;min-height:22px;
  margin-bottom:12px;color:var(--gold);text-align:center;
  font-family:'Syne',sans-serif;letter-spacing:-.01em;
}

/* ── Input ── */
.input-row{display:flex;gap:8px;margin-bottom:10px}
input[type=number]{
  flex:1;padding:12px;border-radius:11px;
  border:2px solid var(--border2);background:rgba(255,255,255,.035);
  color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:28px;font-weight:700;text-align:center;outline:none;
  transition:border-color .2s,box-shadow .2s;
  -moz-appearance:textfield;
}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,56,96,.12)}

.guess-btn{
  padding:12px 18px;border-radius:11px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:'Syne',sans-serif;
  font-size:14px;font-weight:800;cursor:pointer;
  transition:transform .1s,box-shadow .2s;
  box-shadow:0 4px 18px rgba(255,56,96,.3);white-space:nowrap;
}
.guess-btn:active{transform:scale(.94)}
.guess-btn:hover{box-shadow:0 6px 24px rgba(255,56,96,.45)}
.guess-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* ── Quick actions ── */
.actions-row{display:flex;gap:6px}
.act-btn{
  flex:1;padding:8px 4px;border-radius:10px;
  border:1.5px solid var(--border);background:transparent;
  font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.act-btn.hint{color:var(--purple);border-color:rgba(176,106,255,.2)}
.act-btn.hint:hover{border-color:var(--purple);background:rgba(176,106,255,.08)}
.act-btn.share{color:var(--cyan);border-color:rgba(0,212,255,.18)}
.act-btn.share:hover{border-color:var(--cyan);background:rgba(0,212,255,.06)}
.act-btn:disabled{opacity:.2;cursor:not-allowed}

/* ── History ── */
.history{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;margin-top:12px}
.h-item{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  border-radius:9px;padding:7px 12px;
  animation:slideIn .2s ease;
}
.h-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px}
.h-hint{font-size:11px;font-weight:600}
.c-high{color:var(--accent)} .c-low{color:var(--cyan)}
.c-win{color:var(--green)} .c-muted{color:var(--muted)}

/* ══ REWARDED AD SECTION ══ */
.rewards-section{
  border-top:1px solid var(--border);
  padding-top:14px;margin-top:12px;
}
.rewards-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rewards-ttl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.rewards-tag{
  font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(255,204,68,.1);color:var(--gold);
  border:1px solid rgba(255,204,68,.2);border-radius:99px;padding:2px 8px;
}
.reward-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.reward-btn{
  display:flex;flex-direction:column;gap:2px;
  padding:11px 12px;border-radius:12px;
  border:1.5px solid rgba(255,204,68,.15);
  background:rgba(255,204,68,.03);
  cursor:pointer;transition:all .22s;text-align:left;width:100%;
}
.reward-btn:hover:not(:disabled){
  border-color:rgba(255,204,68,.4);background:rgba(255,204,68,.07);
  transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,204,68,.08);
}
.reward-btn:disabled{opacity:.25;cursor:not-allowed}
.reward-btn .r-top{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--gold)}
.reward-btn .r-ico{font-size:16px}
.reward-btn .r-sub{font-size:9px;color:var(--muted)}
.reward-btn.used .r-top{color:var(--green)}
.reward-btn.used{border-color:rgba(13,222,154,.18)}

/* ══ RESULT OVERLAY ══ */
.result-area{display:none;flex-direction:column;align-items:center;gap:8px;text-align:center;padding:4px 0}
.result-area.show{display:flex}
.r-emoji{font-size:62px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.r-title{font-size:24px;font-weight:800;font-family:'Syne',sans-serif;letter-spacing:-.02em}
.r-sub{font-size:13px;color:var(--muted)}
.r-xp{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold)}
.r-badges{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:4px}
.r-badge{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;
  border:1px solid;background:rgba(255,255,255,.04);
}
.btn-play-again{
  width:100%;margin-top:10px;padding:11px;border-radius:12px;
  border:1.5px solid var(--border2);background:transparent;
  color:var(--text);font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;
  letter-spacing:.02em;
}
.btn-play-again:hover{background:rgba(255,255,255,.05);border-color:var(--border2)}

/* ══ IN-FEED AD (between game card and leaderboard) ══ */
.infeed-ad{
  display:flex;justify-content:center;align-items:center;
  min-height:90px;background:rgba(255,255,255,.015);
  border:1px dashed var(--border);border-radius:12px;
  font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;
}

/* ══ LEADERBOARD / ACHIEVEMENTS ══ */
.section-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:16px;
}
.section-ttl{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-ttl::after{content:'';flex:1;height:1px;background:var(--border)}

.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ach-item{
  background:var(--card2);border:1px solid var(--border);
  border-radius:11px;padding:10px 6px;text-align:center;
  transition:all .2s;opacity:.35;
}
.ach-item.unlocked{opacity:1;border-color:rgba(255,204,68,.2)}
.ach-item:hover.unlocked{border-color:rgba(255,204,68,.4);transform:translateY(-1px)}
.ach-ico{font-size:22px;display:block;margin-bottom:3px}
.ach-name{font-size:9px;font-weight:700;color:var(--text);letter-spacing:.03em}
.ach-hint{font-size:8px;color:var(--muted);margin-top:1px}

/* ══ AD OVERLAY (Rewarded) ══ */
.ad-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);backdrop-filter:blur(12px);
  z-index:1000;align-items:center;justify-content:center;
}
.ad-overlay.show{display:flex}
.ad-modal{
  background:var(--card);border:1px solid var(--border2);
  border-radius:22px;padding:28px 24px;
  max-width:340px;width:90%;text-align:center;
  animation:slideUp .3s cubic-bezier(.175,.885,.32,1.275);
}
.ad-modal-ico{font-size:48px;margin-bottom:6px}
.ad-modal-ttl{font-size:19px;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:4px}
.ad-modal-sub{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:18px}
.ad-prog-track{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:6px}
.ad-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:6px;width:0;transition:width .3s linear}
.ad-timer-txt{font-size:10px;color:var(--muted);margin-bottom:16px;font-family:'JetBrains Mono',monospace}
.ad-btn-row{display:flex;gap:8px;justify-content:center}
.btn-close-ad{
  padding:9px 18px;border-radius:10px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;
}
.btn-close-ad:hover{border-color:var(--border2);color:var(--text)}
.btn-claim-reward{
  display:none;padding:9px 18px;border-radius:10px;border:none;
  background:var(--gold);color:#0a0a0a;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;cursor:pointer;
}
.btn-claim-reward.ready{display:block}
.btn-claim-reward:hover{opacity:.88}

/* ══ COMBO POPUP ══ */
.combo-pop{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) scale(.7);
  font-family:'Syne',sans-serif;font-size:28px;font-weight:800;
  color:var(--gold);text-shadow:0 0 30px var(--gold);
  pointer-events:none;opacity:0;z-index:500;
  transition:all .25s cubic-bezier(.175,.885,.32,1.275);
  white-space:nowrap;
}
.combo-pop.show{opacity:1;transform:translateX(-50%) scale(1)}

/* ══ ACHIEVEMENT TOAST ══ */
.ach-toast{
  position:fixed;bottom:70px;right:16px;
  background:var(--card2);border:1px solid rgba(255,204,68,.3);
  border-radius:14px;padding:11px 14px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transform:translateX(120%);transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
  z-index:800;max-width:260px;
}
.ach-toast.show{transform:translateX(0)}
.ach-t-ico{font-size:28px}
.ach-t-body .ach-t-lbl{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.07em;text-transform:uppercase}
.ach-t-body .ach-t-name{font-size:13px;font-weight:700}
.ach-t-body .ach-t-desc{font-size:10px;color:var(--muted)}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:16px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--card2);border:1px solid var(--border2);
  border-radius:99px;padding:9px 18px;
  font-size:12px;font-weight:700;opacity:0;
  transition:all .3s ease;pointer-events:none;z-index:2000;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ ANIMATIONS ══ */
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.2);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pulse{from{opacity:1}to{opacity:.5}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ══ RESPONSIVE ══ */
@media(max-width:800px){
  body{grid-template-columns:1fr;justify-items:center}
  .sidebar{display:none}
  main{grid-column:1;max-width:480px;width:100%}
}
